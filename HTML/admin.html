<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cubiertos Admin Dashboard</title>
  <link rel="stylesheet" href="../CSS/admin.css" />
</head>
<body>


  <header id="adminHeader">
    <div class="logo">
      <img src="../IMAGES/logo.jpg" alt="Logo" />
      <h1><span>Admin</span> Account</h1>
    </div>
    <nav>
      <a href="main.html"> Home</a>
      <button class="btn logout" onclick="logout()"> Logout</button>
    </nav>
  </header>

  
  <main class="dashboard-container">
    <div class="tabs">
      <button id="liveTab" class="tab active"> Live Orders</button>
      <button id="historyTab" class="tab"> Order History</button>
    </div>
   
    <!-- Select date and daily capacity -->
   <section class="admin-status-bar">
    <div class="combined-status-card">
        <div class="status-section">
            <h2 class="section-title">Select Date</h2>
            <div class="calendar-box">
                <div class="calendar-header">
                    <button id="prevMonth">&lt;</button>
                    <span id="monthDisplay"></span>
                    <button id="nextMonth">&gt;</button>
                </div>
                <div class="calendar-days">
                    <span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
                </div>
                <div id="calendarGrid" class="calendar-grid"></div>
            </div>
        </div>

        <div class="vertical-divider"></div>

        <div class="status-section">
            <div class="capacity-header">
                <h2 class="section-title">Daily Capacity</h2>
                <button class="btn-set-limit" onclick="setNewLimit()">⚙ Set Limit</button>
            </div>
            <div class="capacity-body">
                <p class="label-text">Maximum People To Cater</p>
                <p class="capacity-value"><span id="maxCapacity">100</span> / Day</p>
                <div class="progress-container">
                    <div id="capacityFill" class="progress-fill"></div>
                </div>
                <div class="capacity-footer">
                    <p>Current Bookings: <strong id="currentBooked">0</strong> People</p>
                    <p>Slots Available: <strong id="slotsAvailable">100</strong></p>
                </div>
            </div>
        </div>
    </div>
</section>
<!-- End of the updated code -->
 
    <section id="liveOrders">
      <div class="card">
        <h2>Current Orders</h2>
        <table id="ordersTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Contact</th>
              <th>Service</th>
              <th>Amount</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>


    <section id="orderHistory" style="display:none;">
      <div class="card">
        <h2>Order History</h2>
        <table id="historyTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Contact</th>
              <th>Service</th>
              <th>Amount</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>
  
  <script src="JS/admin.js"></script>
</body>
</html>
